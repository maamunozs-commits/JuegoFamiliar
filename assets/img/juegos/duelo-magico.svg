<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Duelo Mágico">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8f3dc"/>
      <stop offset="50%" stop-color="#cce5d8"/>
      <stop offset="100%" stop-color="#f9edde"/>
    </linearGradient>
    <linearGradient id="orb1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <linearGradient id="orb2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e76f51"/>
      <stop offset="100%" stop-color="#c1553d"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9c46a"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-opacity="0.18"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <circle cx="80" cy="60" r="15" fill="#2d6a4f" opacity="0.06"/>
  <circle cx="560" cy="300" r="20" fill="#e76f51" opacity="0.05"/>
  <circle cx="520" cy="50" r="10" fill="#e9c46a" opacity="0.15"/>
  <circle cx="100" cy="280" r="8" fill="#52b788" opacity="0.1"/>
  <circle cx="230" cy="160" r="62" fill="#2d6a4f" opacity="0.08" filter="url(#bigGlow)"/>
  <circle cx="230" cy="160" r="55" fill="url(#orb1)" filter="url(#shadow)"/>
  <circle cx="225" cy="150" r="24" fill="white" opacity="0.15"/>
  <circle cx="210" cy="145" r="8" fill="white" opacity="0.12"/>
  <circle cx="410" cy="160" r="62" fill="#e76f51" opacity="0.08" filter="url(#bigGlow)"/>
  <circle cx="410" cy="160" r="55" fill="url(#orb2)" filter="url(#shadow)"/>
  <circle cx="405" cy="150" r="24" fill="white" opacity="0.15"/>
  <circle cx="395" cy="145" r="8" fill="white" opacity="0.12"/>
  <line x1="285" y1="160" x2="355" y2="160" stroke="url(#spark)" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="320,80 332,116 368,120 340,144 348,180 320,162 292,180 300,144 272,120 308,116" fill="white" filter="url(#glow)"/>
  <polygon points="320,90 329,114 354,117 335,134 341,158 320,146 299,158 305,134 286,117 311,114" fill="url(#spark)"/>
  <style>text { font-family: 'Inter', Arial, sans-serif'; }</style>
  <text x="320" y="306" text-anchor="middle" font-size="24" font-weight="800" fill="#1b4332" letter-spacing="0.02em">Duelo Mágico</text>
</svg>