<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Héroes de Mazo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9ef"/>
      <stop offset="100%" stop-color="#f7ecda"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f0"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#1b4332"/>
    </linearGradient>
    <linearGradient id="cape" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9c46a"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <linearGradient id="crown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9c46a"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-opacity="0.16"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <circle cx="100" cy="80" r="20" fill="#2d6a4f" opacity="0.06"/>
  <circle cx="540" cy="280" r="30" fill="#e76f51" opacity="0.05"/>
  <rect x="215" y="55" width="210" height="220" rx="24" fill="url(#card)" filter="url(#shadow)"/>
  <rect x="215" y="55" width="210" height="220" rx="24" fill="none" stroke="#2d6a4f" stroke-width="2" opacity="0.12"/>
  <rect x="228" y="68" width="184" height="110" rx="14" fill="#d8f3dc"/>
  <circle cx="320" cy="123" r="38" fill="url(#hero)" filter="url(#glow)"/>
  <circle cx="320" cy="118" r="18" fill="white" opacity="0.15"/>
  <path d="M295 208c12-40 38-40 50-60 12 20 38 20 50 60" fill="url(#cape)"/>
  <path d="M295 208c12-40 38-40 50-60" fill="white" opacity="0.1"/>
  <polygon points="320,78 326,92 320,86 314,92" fill="url(#crown)" filter="url(#glow)"/>
  <style>text { font-family: 'Inter', Arial, sans-serif'; }</style>
  <text x="320" y="310" text-anchor="middle" font-size="24" font-weight="800" fill="#1b4332" letter-spacing="0.02em">Héroes de Mazo</text>
</svg>