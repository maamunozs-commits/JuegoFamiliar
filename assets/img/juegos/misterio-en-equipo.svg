<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Misterio en Equipo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef9ef"/>
      <stop offset="100%" stop-color="#f7ecda"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f0"/>
    </linearGradient>
    <linearGradient id="p1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e76f51"/>
      <stop offset="100%" stop-color="#c1553d"/>
    </linearGradient>
    <linearGradient id="p2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9c46a"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <linearGradient id="p3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-opacity="0.18"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <circle cx="80" cy="300" r="40" fill="#2d6a4f" opacity="0.04"/>
  <circle cx="560" cy="70" r="30" fill="#e76f51" opacity="0.05"/>
  <circle cx="290" cy="148" r="80" fill="url(#lens)" filter="url(#shadow)"/>
  <circle cx="290" cy="148" r="80" fill="none" stroke="#2d6a4f" stroke-width="3" opacity="0.18"/>
  <circle cx="290" cy="148" r="65" fill="none" stroke="#2d6a4f" stroke-width="1" opacity="0.08" stroke-dasharray="5 5"/>
  <line x1="360" y1="220" x2="420" y2="280" stroke="#1b2d2a" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <circle cx="420" cy="283" r="8" fill="#1b2d2a" opacity="0.5"/>
  <circle cx="290" cy="148" r="72" fill="none" stroke="#2d6a4f" stroke-width="1" opacity="0.1"/>
  <circle cx="255" cy="118" r="20" fill="url(#p1)" filter="url(#glow)"/>
  <circle cx="255" cy="114" r="8" fill="white" opacity="0.2"/>
  <circle cx="310" cy="128" r="20" fill="url(#p2)" filter="url(#glow)"/>
  <circle cx="310" cy="124" r="8" fill="white" opacity="0.2"/>
  <circle cx="275" cy="175" r="20" fill="url(#p3)" filter="url(#glow)"/>
  <circle cx="275" cy="171" r="8" fill="white" opacity="0.2"/>
  <line x1="265" y1="128" x2="270" y2="165" stroke="#1b4332" stroke-width="2" opacity="0.15" stroke-dasharray="3 3"/>
  <line x1="300" y1="128" x2="280" y2="165" stroke="#1b4332" stroke-width="2" opacity="0.15" stroke-dasharray="3 3"/>
  <line x1="260" y1="120" x2="295" y2="125" stroke="#1b4332" stroke-width="2" opacity="0.15" stroke-dasharray="3 3"/>
  <circle cx="160" cy="90" r="4" fill="#e76f51" opacity="0.3"/>
  <circle cx="440" cy="120" r="3" fill="#2d6a4f" opacity="0.2"/>
  <circle cx="500" cy="250" r="5" fill="#e9c46a" opacity="0.2"/>
  <style>text { font-family: 'Inter', Arial, sans-serif'; }</style>
  <text x="320" y="326" text-anchor="middle" font-size="24" font-weight="800" fill="#1b4332" letter-spacing="0.02em">Misterio en Equipo</text>
</svg>