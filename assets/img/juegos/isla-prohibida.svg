<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Isla Prohibida">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cce5d8"/>
      <stop offset="40%" stop-color="#d8f3dc"/>
      <stop offset="100%" stop-color="#b7e4c7"/>
    </linearGradient>
    <linearGradient id="island" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9c46a"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <linearGradient id="palm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="50%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#52b788"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="360" fill="url(#sky)"/>
  <circle cx="100" cy="60" r="3" fill="#2d6a4f" opacity="0.15"/>
  <circle cx="250" cy="40" r="2" fill="#2d6a4f" opacity="0.1"/>
  <circle cx="450" cy="55" r="3" fill="#2d6a4f" opacity="0.12"/>
  <circle cx="550" cy="35" r="2" fill="#2d6a4f" opacity="0.08"/>
  <path d="M0 260c60-20 110 20 180 0s100-20 160 0 120 20 180 0 120-10 120-10" fill="none" stroke="url(#water)" stroke-width="5" opacity="0.25" stroke-linecap="round"/>
  <path d="M0 275c60-25 110 15 180 0s110-25 170-5 100 20 160 0 120-15 130-10" fill="none" stroke="url(#water)" stroke-width="4" opacity="0.15" stroke-linecap="round"/>
  <ellipse cx="320" cy="185" rx="140" ry="55" fill="url(#island)" filter="url(#shadow)"/>
  <ellipse cx="310" cy="178" rx="80" ry="25" fill="white" opacity="0.15"/>
  <path d="M320 170c8-45 28-75 60-90" stroke="url(#palm)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M380 80c-40 5-65 25-80 55 44-2 70-22 80-55z" fill="#2d6a4f" opacity="0.85" filter="url(#glow)"/>
  <path d="M380 85c-35 4-58 22-70 48 38-1 62-18 70-48z" fill="#52b788" opacity="0.6"/>
  <path d="M380 80c-5 10-15 22-30 30" stroke="#2d6a4f" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M380 80c-10 8-25 14-40 16" stroke="#2d6a4f" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M0 250c80-30 140 20 220 0s120-30 200-5 140 25 220 0" fill="none" stroke="#2d6a4f" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <style>text { font-family: 'Inter', Arial, sans-serif'; }</style>
  <text x="320" y="306" text-anchor="middle" font-size="24" font-weight="800" fill="#1b4332" letter-spacing="0.02em">Isla Prohibida</text>
