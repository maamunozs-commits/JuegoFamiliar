<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Catan Sur">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9ef"/>
      <stop offset="100%" stop-color="#f7ecda"/>
    </linearGradient>
    <linearGradient id="hex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f9f7f0"/>
    </linearGradient>
    <linearGradient id="hexInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9c46a"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <circle cx="80" cy="50" r="30" fill="#2d6a4f" opacity="0.05"/>
  <circle cx="560" cy="320" r="40" fill="#e9c46a" opacity="0.06"/>
  <polygon points="320,60 430,125 430,255 320,320 210,255 210,125" fill="url(#hex)" filter="url(#shadow)"/>
  <polygon points="320,60 430,125 430,255 320,320 210,255 210,125" fill="none" stroke="#2d6a4f" stroke-width="2" opacity="0.12"/>
  <polygon points="320,90 410,145 410,235 320,290 230,235 230,145" fill="none" stroke="#2d6a4f" stroke-width="1" opacity="0.06" stroke-dasharray="4 4"/>
  <polygon points="320,115 395,158 395,232 320,275 245,232 245,158" fill="url(#hexInner)" opacity="0.75" filter="url(#glow)"/>
  <polygon points="320,115 395,158 340,175" fill="white" opacity="0.15"/>
  <path d="M270 215l-50 45V170" fill="url(#mountain)" opacity="0.8" filter="url(#glow)"/>
  <path d="M270 215l-50 45V170" fill="white" opacity="0.15"/>
  <path d="M250 170l-8 14 8-5 8 14-8-20z" fill="white" opacity="0.4"/>
  <circle cx="320" cy="272" r="14" fill="#1b2d2a" opacity="0.8"/>
  <circle cx="320" cy="272" r="7" fill="white" opacity="0.2"/>
  <style>text { font-family: 'Inter', Arial, sans-serif'; }</style>
  <text x="320" y="350" text-anchor="middle" font-size="24" font-weight="800" fill="#1b4332" letter-spacing="0.02em">Catan Sur</text>
</svg>