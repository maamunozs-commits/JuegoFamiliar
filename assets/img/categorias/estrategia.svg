<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Juegos de estrategia">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef9ef"/>
      <stop offset="100%" stop-color="#f7ecda"/>
    </linearGradient>
    <linearGradient id="hex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f9f7f0"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4a261"/>
      <stop offset="100%" stop-color="#e76f51"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9c46a"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <circle cx="550" cy="60" r="50" fill="#2d6a4f" opacity="0.05"/>
  <circle cx="80" cy="290" r="40" fill="#e76f51" opacity="0.05"/>
  <polygon points="320,55 432,120 432,250 320,315 208,250 208,120" fill="url(#hex)" filter="url(#shadow)"/>
  <polygon points="320,55 432,120 432,250 320,315 208,250 208,120" fill="none" stroke="#2d6a4f" stroke-width="2" opacity="0.15"/>
  <polygon points="320,80 420,138 420,238 320,296 220,238 220,138" fill="none" stroke="#2d6a4f" stroke-width="1" opacity="0.08" stroke-dasharray="4 4"/>
  <rect x="218" y="128" width="56" height="100" rx="8" fill="url(#bar1)" filter="url(#glow)"/>
  <rect x="218" y="128" width="56" height="30" rx="8" fill="white" opacity="0.2"/>
  <rect x="292" y="108" width="56" height="120" rx="8" fill="url(#bar2)" filter="url(#glow)"/>
  <rect x="292" y="108" width="56" height="30" rx="8" fill="white" opacity="0.2"/>
  <rect x="366" y="148" width="56" height="80" rx="8" fill="url(#bar3)" filter="url(#glow)"/>
  <rect x="366" y="148" width="56" height="30" rx="8" fill="white" opacity="0.2"/>
  <circle cx="320" cy="262" r="16" fill="#1b2d2a" opacity="0.8"/>
  <circle cx="320" cy="262" r="8" fill="white" opacity="0.3"/>
  <text x="320" y="345" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="22" font-weight="800" fill="#1b4332" letter-spacing="0.05em" opacity="0.7">ESTRATEGIA</text>
</svg>