  <rect x="318" y="65" width="130" height="190" rx="16" fill="url(#card2)" filter="url(#cardShadow)" transform="rotate(8 383 160)"/>
  <rect x="186" y="66" width="130" height="190" rx="16" fill="none" stroke="#2d6a4f" stroke-width="2" opacity="0.15" transform="rotate(-12 251 161)"/>
