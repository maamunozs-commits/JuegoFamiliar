<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Juegos cooperativos">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef9ef"/>
      <stop offset="100%" stop-color="#f7ecda"/>
    </linearGradient>
    <linearGradient id="circle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f0"/>
    </linearGradient>
    <linearGradient id="p1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e76f51"/>
      <stop offset="100%" stop-color="#c1553d"/>
    </linearGradient>
    <linearGradient id="p2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9c46a"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <linearGradient id="p3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <circle cx="60" cy="50" r="30" fill="#2d6a4f" opacity="0.04"/>
  <circle cx="580" cy="310" r="50" fill="#e76f51" opacity="0.04"/>
  <circle cx="320" cy="168" r="108" fill="url(#circle)" filter="url(#shadow)"/>
  <circle cx="320" cy="168" r="108" fill="none" stroke="#2d6a4f" stroke-width="2.5" opacity="0.12" stroke-dasharray="8 6"/>
  <circle cx="320" cy="168" r="88" fill="none" stroke="#2d6a4f" stroke-width="1" opacity="0.06"/>
  <circle cx="320" cy="108" r="30" fill="url(#p1)" filter="url(#glow)"/>
  <circle cx="320" cy="103" r="12" fill="white" opacity="0.25"/>
  <circle cx="260" cy="198" r="30" fill="url(#p2)" filter="url(#glow)"/>
  <circle cx="260" cy="193" r="12" fill="white" opacity="0.25"/>
  <circle cx="380" cy="198" r="30" fill="url(#p3)" filter="url(#glow)"/>
  <circle cx="380" cy="193" r="12" fill="white" opacity="0.25"/>
  <line x1="320" y1="136" x2="286" y2="190" stroke="#1b4332" stroke-width="3" opacity="0.25" stroke-linecap="round"/>
  <line x1="320" y1="136" x2="354" y2="190" stroke="#1b4332" stroke-width="3" opacity="0.25" stroke-linecap="round"/>
  <line x1="286" y1="198" x2="354" y2="198" stroke="#1b4332" stroke-width="3" opacity="0.25" stroke-linecap="round"/>
  <text x="320" y="328" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="22" font-weight="800" fill="#1b4332" letter-spacing="0.05em" opacity="0.7">COOPERATIVOS</text>
</svg>