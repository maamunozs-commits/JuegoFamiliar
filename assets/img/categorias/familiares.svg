<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Juegos familiares">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8f3dc"/>
      <stop offset="100%" stop-color="#b7e4c7"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0faf2"/>
    </linearGradient>
    <linearGradient id="piece1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4a261"/>
      <stop offset="100%" stop-color="#e76f51"/>
    </linearGradient>
    <linearGradient id="piece2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9c46a"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <linearGradient id="piece3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <circle cx="80" cy="60" r="40" fill="#2d6a4f" opacity="0.06"/>
  <circle cx="560" cy="300" r="60" fill="#e76f51" opacity="0.05"/>
  <circle cx="500" cy="50" r="30" fill="#e9c46a" opacity="0.1"/>
  <rect x="70" y="60" width="500" height="230" rx="24" fill="url(#card)" filter="url(#shadow)"/>
  <rect x="70" y="60" width="500" height="230" rx="24" fill="none" stroke="#2d6a4f" stroke-width="2" opacity="0.2"/>
  <circle cx="190" cy="155" r="44" fill="url(#piece1)" filter="url(#glow)"/>
  <circle cx="190" cy="150" r="20" fill="white" opacity="0.3"/>
  <circle cx="320" cy="155" r="44" fill="url(#piece2)" filter="url(#glow)"/>
  <circle cx="320" cy="150" r="20" fill="white" opacity="0.3"/>
  <circle cx="450" cy="155" r="44" fill="url(#piece3)" filter="url(#glow)"/>
  <circle cx="450" cy="150" r="20" fill="white" opacity="0.3"/>
  <rect x="140" y="225" width="360" height="6" rx="3" fill="#2d6a4f" opacity="0.15"/>
  <rect x="140" y="215" width="360" height="6" rx="3" fill="#2d6a4f" opacity="0.08"/>
  <circle cx="190" cy="155" r="10" fill="white" opacity="0.6"/>
  <circle cx="320" cy="155" r="10" fill="white" opacity="0.6"/>
  <circle cx="450" cy="155" r="10" fill="white" opacity="0.6"/>
  <text x="320" y="330" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="22" font-weight="800" fill="#1b4332" letter-spacing="0.05em" opacity="0.7">FAMILIARES</text>
</svg>